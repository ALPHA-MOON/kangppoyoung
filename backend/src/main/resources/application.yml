spring:
  application:
    name: policyfund-backend
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  # 기본 검색이 openai 이므로 실제 OPENAI_API_KEY 가 필요하다. sk-noop 은 컨텍스트 기동만 가능(실제 호출 실패).
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-noop}
      chat:
        options:
          model: gpt-4o

# 검색 파이프라인: 벡터(코사인) 검색 + OpenAI 임베딩/답변 합성 + 부팅 시 out/**/chunks.jsonl 자동 적재.
# 기본값이 openai 이므로 실제 OPENAI_API_KEY 가 필요하다(질의 임베딩·LLM 답변·부팅 적재가 모두 OpenAI 호출).
# 키 없이 오프라인으로 돌리려면 provider 를 각각 hash / offline 로 바꾸고 chunk_embedding 을 재적재한다.
search:
  retrieval: vector
  embedding:
    provider: openai
  synth:
    provider: openai
  ingest:
    on-startup: true

# 개정본 등록 시 검색 인덱스를 그 카테고리 '최신본'으로 재색인(번들된 python pipeline 사용).
# 운영 컨테이너엔 pipeline 이 함께 실려 있어 기본 활성. 비동기로 동작하며 실패는 등록에 영향 없음.
notices:
  reindex:
    enabled: true
    # chunker: pipeline           # 기본. 다른 구현으로 교체 시 변경
    # python: ${PIPELINE_PYTHON:python3}
    # pipeline-dir: .             # `python -m pipeline` 가 pipeline 패키지를 찾는 작업 디렉터리(컨테이너=/app)
    # timeout-seconds: 300

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
